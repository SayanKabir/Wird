name: wird2
description: "Wird - A minimalist Islamic prayer companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Prayer Calculations
  adhan: ^2.0.0

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Notifications
  flutter_local_notifications: ^17.0.0
  android_alarm_manager_plus: ^4.0.4
  timezone: ^0.9.2

  # Qibla / Compass
  flutter_compass: ^0.8.0

  # Permissions
  permission_handler: ^11.1.0

  # Utils
  intl: ^0.19.0
  flutter_timezone: ^5.0.1
  http: ^1.2.0
  home_widget: ^0.9.0
  percent_indicator: ^4.2.5
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.2
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation for Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

  # Testing
  mockito: ^5.4.4

  # App Icon Generator
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # Ensure your assets folder is declared so the app can use the image internally too
  assets:
    - assets/

# -----------------------------------------------------------------------------
# APP ICON CONFIGURATION
# -----------------------------------------------------------------------------
# Run command to generate: dart run flutter_launcher_icons
# Launcher icon

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/wird4.png"

